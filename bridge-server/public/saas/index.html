<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kick Integration Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- AUTHENTICATION VIEW -->
  <div id="auth-view" class="view-container">
    <div class="glass-panel auth-panel">
      <h1 class="brand-title">Kick Integration Platform</h1>
      <p class="subtitle">Connect your Minecraft server to Kick.</p>
      
      <div class="tabs">
        <button id="tab-login" class="tab active" onclick="switchAuthTab('login')">Login</button>
        <button id="tab-register" class="tab" onclick="switchAuthTab('register')">Register</button>
      </div>

      <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" required placeholder="you@example.com">
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" id="auth-btn" class="primary-btn">Login</button>
      </form>
      <div id="auth-error" class="error-msg"></div>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view" class="view-container" style="display: none;">
    <nav class="glass-navbar">
      <div class="brand">Kick Integration</div>
      <div class="nav-links">
        <span id="user-email"></span>
        <button onclick="logout()" class="secondary-btn">Logout</button>
      </div>
    </nav>

    <main class="dashboard-content">
      <header class="dashboard-header">
        <h2>Your Servers</h2>
        <button onclick="openNewServerModal()" class="primary-btn">+ Add Server</button>
      </header>

      <div id="servers-grid" class="servers-grid">
        <!-- Server cards populated here -->
      </div>
    </main>
  </div>

  <!-- NEW SERVER MODAL -->
  <div id="new-server-modal" class="modal-overlay" style="display: none;">
    <div class="glass-panel modal">
      <h2>Add New Server</h2>
      <form onsubmit="handleCreateServer(event)">
        <div class="input-group">
          <label>Minecraft Server Name</label>
          <input type="text" id="new-server-name" required placeholder="e.g. Factions PvP">
        </div>
        <div class="alert-info">
          Optional: Provide your own Kick Developer credentials to use your own branding. Leave blank to use our global Kick App.
        </div>
        <div class="input-group">
          <label>Kick Client ID (Optional)</label>
          <input type="text" id="new-server-client-id" placeholder="Client ID">
        </div>
        <div class="input-group">
          <label>Kick Client Secret (Optional)</label>
          <input type="password" id="new-server-secret" placeholder="Client Secret">
        </div>
        <div class="modal-actions">
          <button type="button" class="secondary-btn" onclick="closeNewServerModal()">Cancel</button>
          <button type="submit" class="primary-btn">Create</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
